<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Live Translation</title>

<script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.js"></script>

<style>
*{box-sizing:border-box}

html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.app{
    width:100%;
    max-width:420px;
    min-height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    text-align:center;
}

.badge{
    display:inline-block;
    margin:0 auto 18px;
    padding:8px 14px;
    border-radius:999px;
    background:#1e293b;
    color:#93c5fd;
    font-size:14px;
    font-weight:700;
}

h1{
    font-size:30px;
    margin:0 0 12px;
}

.subtitle{
    font-size:16px;
    color:#cbd5e1;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:14px;
    margin-bottom:14px;
    border-radius:12px;
    font-size:16px;
    border:none;
}

button{
    width:100%;
    padding:20px;
    font-size:22px;
    font-weight:700;
    border:none;
    border-radius:16px;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
    margin-bottom:14px;
}

button:active{
    transform:scale(.98);
}

button:disabled{
    background:#64748b!important;
    color:#cbd5e1!important;
}

#startBtn{
    background:#22c55e;
    color:#052e16;
}

#stopBtn{
    background:#ef4444;
    color:#fff;
}

#status{
    padding:16px;
    border-radius:14px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:18px;
    line-height:1.4;
    min-height:56px;
    word-break:break-word;
}

.audio-panel{
    margin-bottom:14px;
    padding:14px;
    border-radius:14px;
    background:#1e293b;
    text-align:left;
}

.audio-panel-title{
    margin-bottom:12px;
    color:#38bdf8;
    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
}

.audio-row{
    margin-bottom:12px;
}

.audio-row:last-child{
    margin-bottom:0;
}

.audio-row label{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    color:#cbd5e1;
    margin-bottom:8px;
}

input[type=range]{
    width:100%;
}

.audio-toggle{
    display:flex;
    align-items:center;
    gap:10px;
    color:#cbd5e1;
    font-size:14px;
}

.audio-toggle input{
    width:20px;
    height:20px;
}
</style>
</head>

<body>

<div class="app">

    <div class="badge">
        AI Live Translation
    </div>

    <h1 id="title">
        Live speech → Choose language
    </h1>

    <div class="subtitle">
        Live speech input from tablet microphone / console
    </div>

    <select id="languageSelect">
        <option value="en" selected>English</option>
        <option value="es">Spanish</option>
        <option value="pt">Portuguese</option>
        <option value="fr">French</option>
        <option value="it">Italian</option>
        <option value="de">German</option>
        <option value="ru">Russian</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="hi">Hindi</option>
        <option value="id">Indonesian</option>
        <option value="vi">Vietnamese</option>
    </select>

    <button id="startBtn">
        Start Translation
    </button>

    <button id="stopBtn" disabled>
        Stop
    </button>

    <div class="audio-panel">
        <div class="audio-panel-title">Translation Audio Boost</div>

        <div class="audio-row">
            <label>
                <span>Gain Boost</span>
                <span id="gainValue">3.0x</span>
            </label>
            <input
                type="range"
                id="gainSlider"
                min="1"
                max="5"
                step="0.1"
                value="3"
            >
        </div>

        <label class="audio-toggle">
            <input type="checkbox" id="compressorToggle" checked>
            <span>Compressor / Voice Leveler ON</span>
        </label>
    </div>

    <div id="status">
        Ready
    </div>

</div>
<script src="config.js"></script>
<script>
const LIVEKIT_URL = `ws://${SERVER_IP}:7880`;
const ROOM_NAME = 'translation-room';

const OPENAI_SESSION_URL = `/session`;

const statusDiv = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const languageSelect = document.getElementById('languageSelect');
const title = document.getElementById('title');
const gainSlider = document.getElementById('gainSlider');
const gainValue = document.getElementById('gainValue');
const compressorToggle = document.getElementById('compressorToggle');

const LANGUAGE_NAMES = {
    en: 'English',
    es: 'Spanish',
    pt: 'Portuguese',
    fr: 'French',
    it: 'Italian',
    de: 'German',
    ru: 'Russian',
    zh: 'Chinese',
    ja: 'Japanese',
    ko: 'Korean',
    hi: 'Hindi',
    id: 'Indonesian',
    vi: 'Vietnamese'
};

let pc = null;
let localStream = null;
let room = null;
let audioEl = null;
let livekitTrack = null;
let wakeLock = null;
let liveKitConnected = false;

let boostAudioContext = null;
let boostGainNode = null;
let boostCompressorNode = null;
let boostDestination = null;

function getTargetLanguage() {
    return languageSelect.value || 'en';
}

function getTranslatorIdentity() {
    return 'translator-' + getTargetLanguage();
}

function updateTitle() {
    const lang = getTargetLanguage();

    title.textContent =
        'Live → ' + LANGUAGE_NAMES[lang];

    statusDiv.textContent =
        'Ready for ' + LANGUAGE_NAMES[lang] +
        ' / identity: ' + getTranslatorIdentity();
}

languageSelect.onchange = updateTitle;

window.addEventListener('load', updateTitle);
window.addEventListener('load', updateGainLabel);

function updateGainLabel() {
    gainValue.textContent = Number(gainSlider.value).toFixed(1) + 'x';

    if (boostGainNode && boostAudioContext) {
        boostGainNode.gain.setTargetAtTime(
            Number(gainSlider.value),
            boostAudioContext.currentTime,
            0.03
        );
    }
}

gainSlider.oninput = updateGainLabel;

compressorToggle.onchange = () => {
    if (boostCompressorNode && boostAudioContext) {
        const enabled = compressorToggle.checked;

        boostCompressorNode.threshold.setTargetAtTime(
            enabled ? -18 : 0,
            boostAudioContext.currentTime,
            0.05
        );

        boostCompressorNode.ratio.setTargetAtTime(
            enabled ? 4 : 1,
            boostAudioContext.currentTime,
            0.05
        );
    }
};

function createBoostedTranslationStream(translatedStream) {
    boostAudioContext = new (
        window.AudioContext || window.webkitAudioContext
    )();

    const source =
        boostAudioContext.createMediaStreamSource(translatedStream);

    boostGainNode = boostAudioContext.createGain();
    boostGainNode.gain.value = Number(gainSlider.value);

    boostCompressorNode =
        boostAudioContext.createDynamicsCompressor();

    const compressorEnabled = compressorToggle.checked;

    boostCompressorNode.threshold.value =
        compressorEnabled ? -18 : 0;

    boostCompressorNode.knee.value = 20;

    boostCompressorNode.ratio.value =
        compressorEnabled ? 4 : 1;

    boostCompressorNode.attack.value = 0.003;
    boostCompressorNode.release.value = 0.25;

    boostDestination =
        boostAudioContext.createMediaStreamDestination();

    source.connect(boostGainNode);
    boostGainNode.connect(boostCompressorNode);
    boostCompressorNode.connect(boostDestination);

    return boostDestination.stream;
}

async function closeBoostAudioContext() {
    try {
        if (boostAudioContext) {
            await boostAudioContext.close();
        }
    } catch(e) {
        console.warn('Boost audio context close failed:', e);
    }

    boostAudioContext = null;
    boostGainNode = null;
    boostCompressorNode = null;
    boostDestination = null;
}

// ------------------------------------
// CONNECT LIVEKIT
// ------------------------------------

async function connectLiveKit(translatedStream) {

    if (liveKitConnected) {
        return;
    }

    const identity = getTranslatorIdentity();

    statusDiv.textContent =
        'Getting LiveKit token for ' + identity + '...';

    const response = await fetch(
        `/token?room=${ROOM_NAME}&identity=${identity}`
    );

    if (!response.ok) {
        throw new Error('LiveKit token request failed');
    }

    const data = await response.json();

    room = new LivekitClient.Room();

    statusDiv.textContent = 'Connecting to LiveKit...';

    await room.connect(
        LIVEKIT_URL,
        data.token
    );

    const translatedTrack =
        translatedStream.getAudioTracks()[0];

    if (!translatedTrack) {
        throw new Error('No translated audio track received');
    }

    livekitTrack =
        new LivekitClient.LocalAudioTrack(translatedTrack);

    await room.localParticipant.publishTrack(livekitTrack);

    liveKitConnected = true;

    statusDiv.textContent =
        'Translation active: ' + identity;

}

// ------------------------------------
// START TRANSLATION
// ------------------------------------

startBtn.onclick = async () => {

    try {

        startBtn.disabled = true;
        languageSelect.disabled = true;

        const targetLanguage = getTargetLanguage();
        const identity = getTranslatorIdentity();

        if ('wakeLock' in navigator) {
            try {
                wakeLock =
                    await navigator.wakeLock.request('screen');
            } catch(e) {
                console.warn('Wake lock failed:', e);
            }
        }

        if (
            !navigator.mediaDevices ||
            !navigator.mediaDevices.getUserMedia
        ) {
            throw new Error(
                'Microphone API unavailable. Use HTTPS or localhost.'
            );
        }

        statusDiv.textContent =
            'Opening microphone for ' +
            LANGUAGE_NAMES[targetLanguage] + '...';

        localStream =
            await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false,
                    channelCount: 1,
                    sampleRate: 48000
                }
            });

        statusDiv.textContent =
            'Creating OpenAI session: ' +
            LANGUAGE_NAMES[targetLanguage] + '...';

        const sessionRes = await fetch(
            OPENAI_SESSION_URL,
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body: JSON.stringify({
                    targetLanguage: targetLanguage
                })
            }
        );

        const sessionData = await sessionRes.json();

        if (!sessionRes.ok || !sessionData.value) {
            console.error(sessionData);
            throw new Error('OpenAI session request failed');
        }

        const EPHEMERAL_KEY = sessionData.value;

        statusDiv.textContent =
            'Connecting OpenAI realtime...';

        pc = new RTCPeerConnection();

        audioEl = document.createElement('audio');
        audioEl.autoplay = true;
        audioEl.muted = true;

        pc.ontrack = async(event) => {

            try {

                const translatedStream = event.streams[0];

                audioEl.srcObject = translatedStream;

                await closeBoostAudioContext();

                const boostedStream =
                    createBoostedTranslationStream(translatedStream);

                await connectLiveKit(boostedStream);

            } catch(err) {

                console.error(err);

                statusDiv.textContent =
                    'LiveKit publish error: ' + err.message;

            }

        };

        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });

        const offer = await pc.createOffer();

        await pc.setLocalDescription(offer);

        const sdpResponse = await fetch(
            'https://api.openai.com/v1/realtime/translations/calls',
            {
                method: 'POST',
                body: offer.sdp,
                headers: {
                    Authorization: `Bearer ${EPHEMERAL_KEY}`,
                    'Content-Type': 'application/sdp'
                }
            }
        );

        const sdpText = await sdpResponse.text();

        if (!sdpResponse.ok) {
            console.error(sdpText);
            throw new Error('OpenAI SDP error: ' + sdpText);
        }

        if (!sdpText.startsWith('v=')) {
            console.error(sdpText);
            throw new Error('Invalid SDP response from OpenAI');
        }

        await pc.setRemoteDescription({
            type: 'answer',
            sdp: sdpText
        });

        stopBtn.disabled = false;

        statusDiv.textContent =
            'OpenAI connected. Identity: ' + identity;

    } catch(err) {

        console.error(err);

        statusDiv.textContent =
            'ERROR: ' + err.message;

        startBtn.disabled = false;
        languageSelect.disabled = false;

    }

};

// ------------------------------------
// STOP
// ------------------------------------

stopBtn.onclick = async () => {

    try {

        if (livekitTrack) {
            livekitTrack.stop();
            livekitTrack = null;
        }

        if (room) {
            room.disconnect();
            room = null;
        }

        liveKitConnected = false;

        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }

        if (pc) {
            pc.close();
            pc = null;
        }

        if (audioEl) {
            audioEl.pause();
            audioEl.srcObject = null;
            audioEl = null;
        }

        await closeBoostAudioContext();

        if (wakeLock) {
            try {
                await wakeLock.release();
            } catch(e) {}
            wakeLock = null;
        }

        statusDiv.textContent = 'Stopped';

        startBtn.disabled = false;
        stopBtn.disabled = true;
        languageSelect.disabled = false;

        updateTitle();

    } catch(err) {

        console.error(err);

        statusDiv.textContent =
            'ERROR: ' + err.message;

    }

};
</script>

</body>
</html>
